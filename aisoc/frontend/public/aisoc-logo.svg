<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="AISOC logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1f36" />
      <stop offset="100%" stop-color="#04111f" />
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dffde" />
      <stop offset="100%" stop-color="#10fca0" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="88" height="88" rx="22" fill="url(#bg)" stroke="#184061" stroke-width="2" />

  <g stroke="url(#neon)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- Robot head -->
    <rect x="22" y="20" width="52" height="34" rx="11" />
    <path d="M48 14v6" />
    <circle cx="38" cy="37" r="3.5" />
    <circle cx="58" cy="37" r="3.5" />
    <path d="M41 46h14" />

    <!-- Security shield -->
    <path d="M48 56l16 6v9c0 11-8.2 16.6-16 20-7.8-3.4-16-9-16-20v-9l16-6Z" />

    <!-- Automation gear -->
    <circle cx="70.5" cy="20.5" r="8.5" />
    <path d="M70.5 8v4M70.5 29v4M58 20.5h4M79 20.5h4M61.7 11.7l2.8 2.8M76.5 26.5l2.8 2.8M79.3 11.7l-2.8 2.8M64.5 26.5l-2.8 2.8" />
    <circle cx="70.5" cy="20.5" r="2.4" />
  </g>
</svg>
