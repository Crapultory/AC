name: 手动获取系统与环境信息

# 1. 配置触发器：workflow_dispatch 表示允许在 GitHub 界面上手动点击触发执行
on:
  workflow_dispatch:

jobs:
  inspect-system:
    name: 检查系统环境信息
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 运行器

    steps:
      # 步骤 1：拉取代码（可选，但通常作为规范的第一步）
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 步骤 2：通过执行多行 run 命令获取所需信息
      - name: 获取系统版本、环境变量和当前路径
        run: |
          echo "=================================================="
          echo "   项目 1: 获取系统当前版本 (System Version)       "
          echo "=================================================="
          uname -a
          echo "详细发行版信息："
          cat /etc/os-release
          
          echo -e "\n=================================================="
          echo "   项目 2: 获取当前工作路径 (Current Path)          "
          echo "=================================================="
          pwd
          
          echo -e "\n=================================================="
          echo "   项目 3: 获取当前环境变量 (Environment Variables) "
          echo "=================================================="
          # 为了防止部分敏感变量泄露，此处直接打印全部环境变量。
          # 在生产环境中请注意不要随意在日志中暴露包含密码或 Token 的自定义变量。
          env | sort
